<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Process</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }

        .gif-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .gif-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;

            padding: 12px 20px;
            border-radius: 999px;

            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);

            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="gif-wrapper">
    <img src="process.gif" alt="Project Process">

    <button class="back-btn" onclick="history.back()">
        ← Back
    </button>
</div>

</body>
</html>
